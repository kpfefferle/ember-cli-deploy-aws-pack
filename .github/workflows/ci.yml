name: Ember CI
on: push
jobs:
  test:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20.x
          cache: yarn
      - name: Install Dependencies
        run: yarn install
