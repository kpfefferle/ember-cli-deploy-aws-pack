name: Ember CI
on: push
jobs:
  test:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Use Node.js
        uses: volta-cli/action@v5
        with:
          node-version: 18
      - name: Install pnpm
        run: volta install pnpm@10
      - name: Install Dependencies
        run: pnpm install
